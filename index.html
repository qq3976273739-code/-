<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎天寿资源整理网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        /* 页面整体半透明黑底背景 */
        body {
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('');
            background-color: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        /* 右上角圆形头像 */
        .avatar {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }

        /* 网站标题样式 */
        .title-box {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .website-name {
            font-size: 36px;
            color: #fff;
            text-shadow: 0 0 5px #000;
        }

        /* 作者信息（标题右下角） */
        .author-info {
            position: absolute;
            right: 35%;
            bottom: -25px;
            font-size: 14px;
            color: #ccc;
        }

        .author-info a {
            color: #ccc;
            text-decoration: none;
            margin-left: 10px;
        }

        .author-info a:hover {
            color: #fff;
        }

        /* 导航栏样式（半透明黑底） */
        .nav {
            width: 80%;
            margin: 50px auto;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
        }

        .nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        .nav li {
            position: relative;
            padding: 10px 0;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
        }

        .nav a:hover {
            color: #ff6600;
        }

        /* 下拉菜单 */
        .nav .sub-menu {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background-color: rgba(0,0,0,0.9);
            border-radius: 5px;
            padding: 10px;
            width: 150px;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
        }

        .nav li:hover .sub-menu {
            display: flex;
        }

        /* 三级菜单 */
        .sub-menu .sub-child {
            display: none;
            position: absolute;
            left: 150px;
            top: 70px;
            background-color: rgba(0,0,0,0.9);
            border-radius: 5px;
            padding: 10px;
            width: 120px;
            flex-direction: column;
            gap: 10px;
        }

        .sub-menu li:hover .sub-child {
            display: flex;
        }

        /* 实时时钟（左侧中间） */
        .clock {
            text-align: left;
            margin: 100px 50px;
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff6600;
        }

        /* 捐献提示（醒目样式） */
        .donate {
            text-align: center;
            margin: 50px 0;
        }

        .donate-title {
            font-size: 24px;
            color: #ff6600;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .donate img {
            width: 200px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 底部文案 */
        .footer-text {
            text-align: center;
            margin-top: 80px;
            font-size: 16px;
            color: #ccc;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- 右上角圆形头像 -->
    <img src="https://s41.ax1x.com/2026/04/18/pe6CRHA.jpg" alt="头像" class="avatar">

    <!-- 网站标题 + 作者信息 -->
    <div class="title-box">
        <h1 class="website-name">虎天寿资源整理网站</h1>
        <div class="author-info">
            QQ：3608504926
            <a href="https://space.bilibili.com/3493111242164758" target="_blank">作者主页</a>
        </div>
    </div>

    <!-- 导航栏 -->
    <div class="nav">
        <ul>
            <li><a href="#">首页</a></li>
            <li>
                <a href="#">系统镜像</a>
                <ul class="sub-menu">
                    <li><a href="#">微系统</a></li>
                    <li><a href="#">Win系统镜像</a></li>
                </ul>
            </li>
            <li>
                <a href="#">必装软件</a>
                <ul class="sub-menu">
                    <li><a href="#">系统</a></li>
                    <li><a href="#">游戏</a></li>
                    <li>
                        <a href="#">日常</a>
                        <ul class="sub-child">
                            <li><a href="#">播放</a></li>
                            <li><a href="#">解压缩</a></li>
                            <li><a href="#">安全</a></li>
                            <li><a href="#">社交</a></li>
                        </ul>
                    </li>
                </ul>
            </li>
            <li><a href="#">网站加速器</a></li>
        </ul>
    </div>

    <!-- 左侧实时时钟 -->
    <div class="clock" id="clock"></div>

    <!-- 捐献提示 -->
    <div class="donate">
        <div class="donate-title">捐献一点吧</div>
        <a href="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png" target="_blank">
            <img src="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png" alt="捐献码">
        </a>
    </div>

    <!-- 底部文案 -->
    <div class="footer-text">
        整理资源耗费大量精力，维护网站也需要持续付出，感谢您的理解与支持
    </div>

    <!-- 实时时钟JS -->
    <script>
        function showTime() {
            let date = new Date();
            let hours = date.getHours().toString().padStart(2, '0');
            let minutes = date.getMinutes().toString().padStart(2, '0');
            let seconds = date.getSeconds().toString().padStart(2, '0');
            let time = hours + ":" + minutes + ":" + seconds;
            document.getElementById("clock").innerText = time;
        }
        // 每秒刷新一次时间
        setInterval(showTime, 1000);
        showTime();
    </script>
</body>
</html>
